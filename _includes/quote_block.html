<section class="post-feed home-quote-feed" aria-label="Testimonials">
  {% for quote_item in include.collection %}
  <article id="{{ quote_item.id }}" class="post-card home-quote-card">
    <p class="home-quote-text">{{ quote_item.quote }}</p>
    <p class="home-quote-author">{{ quote_item.author }}</p>
    {% if quote_item.title and quote_item.title != "" %}
    <p class="home-quote-title">{{ quote_item.title }}</p>
    {% endif %}
  </article>
  {% endfor %}
</section>
