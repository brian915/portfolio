<section class="post-feed" aria-label="Testimonials">
  {% for quote_item in include.collection %}
  <article id="{{ quote_item.id }}" class="post-card quote-card">
    <p class="quote-text">{{ quote_item.quote }}</p>
    <p class="quote-author">{{ quote_item.author }}</p>
    <p class="quote-title">{{ quote_item.title }}</p>
  </article>
  {% endfor %}
</section>
